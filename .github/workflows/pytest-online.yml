---
# SPDX-FileCopyrightText: 2025 The python_openobserve authors
# SPDX-License-Identifier: GPL-3.0-or-later
name: pytest-online

on:
  push:
  pull_request:
  workflow_dispatch:
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        python-version: ["3.14"]

    env:
      ANSIBLE_CALLBACKS_ENABLED: profile_tasks
      ANSIBLE_EXTRA_VARS: ""
      ANSIBLE_ROLE: juju4.openobserve
      ANSIBLE_SUITE: default-full-python

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5  # v2.19.3
        with:
          egress-policy: block
          allowed-endpoints: >
            azure.archive.ubuntu.com:80
            dl.google.com:443
            esm.ubuntu.com:443
            files.pythonhosted.org:443
            galaxy.ansible.com:443
            github.com:443
            packages.microsoft.com:443
            pypi.org:443
            www.google.com:1025

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache the virtualenv
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt
            ./.venv
          key: ${{ runner.os }}-pyo2-${{ steps.get-date.outputs.date }}

      - name: Environment
        run: |
          set -x
          pwd
          ls
          ls $GITHUB_WORKSPACE
      - name: Install ansible dependencies
        run: |
          pip3 install -r $GITHUB_WORKSPACE/requirements-ansible.txt
          which ansible
          pip3 show ansible
          ls -l $HOME/.local/bin || true
          ansible --version
          git clone https://github.com/juju4/ansible-openobserve/ $GITHUB_WORKSPACE/$ANSIBLE_ROLE
          cd $GITHUB_WORKSPACE/$ANSIBLE_ROLE
          [ -f molecule/$ANSIBLE_SUITE/requirements.yml ] && ansible-galaxy install -r molecule/$ANSIBLE_SUITE/requirements.yml
          { echo '[defaults]'; echo 'callback_enabled = profile_tasks, timer'; echo 'roles_path = ../:/home/runner/.ansible/roles'; echo 'ansible_python_interpreter: /usr/bin/python3'; } >> ansible.cfg
      - name: Install OpenObserve
        run: |
          cd $GITHUB_WORKSPACE/$ANSIBLE_ROLE && ansible-playbook -i localhost, --connection=local --become -v molecule/$ANSIBLE_SUITE/converge.yml ${ANSIBLE_EXTRA_VARS}
        env:
          PY_COLORS: '1'
          ANSIBLE_FORCE_COLOR: '1'
        continue-on-error: true

      - name: Install recent libgit2
        run: |
          set -x
          sudo apt-get purge -y libgit2-1.7 libgit2-dev
          sudo apt-get install -y heimdal-dev
          curl -OL https://github.com/libgit2/libgit2/archive/refs/tags/v1.9.4.tar.gz && \
            tar xzf v1.9.4.tar.gz && \
            cd libgit2-1.9.4 && \
            ./ci/build.sh && \
            sudo make install

      - name: Install dependencies
        run: |
          set -x
          pip install -e '.[all]'
          pip install -r requirements-dev.txt

      - name: Set .env for online tests
        run: |
          set -x
          cat > .env <<EOF
          OPENOBSERVE_URL = "http://localhost:5080"
          OPENOBSERVE_USER = "root@example.com"
          OPENOBSERVE_PASS = "root@example.com"
          EOF
          cat .env

      - name: Test with pytest  - online
        run: |
          [ -f .env ] && pytest tests/test_openobserve_api.py --doctest-modules --junitxml=junit/test-${{ matrix.python-version }}-results.xml --cov=com --cov-report=xml --cov-report=html --memray
        if: ${{ always() }}
        continue-on-error: true

      - name: Upload pytest test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # tag=v7.0.1
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: junit/test-${{ matrix.python-version }}-results-online.xml
        # Use always() to always run this step to publish test results when there are test failures
        if: ${{ always() }}
